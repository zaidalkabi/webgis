<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGeo WebGIS Workbench</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.0/dist/leaflet-geoman.css">

    <link rel="stylesheet" href="app.css">
</head>
<body>

    <div id="app-container" class="app-layout">
        
        <header class="app-header">
            <div class="header-logo">
                <i class="fa-solid fa-earth-americas"></i>
                <span data-i18n="appTitle">ProGeo WebGIS</span>
            </div>
            <div class="header-actions">
                <button id="lang-toggle-btn" class="btn btn-secondary">
                    <i class="fa-solid fa-language"></i> <span id="lang-text">العربية</span>
                </button>
            </div>
        </header>

        <div class="main-content">
            
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="create-tab" data-i18n="tabCreate">Create</button>
                    <button class="tab-btn" data-tab="import-tab" data-i18n="tabImport">Import</button>
                    <button class="tab-btn" data-tab="export-tab" data-i18n="tabExport">Export</button>
                </div>

                <div class="sidebar-body">
                    
                    <div id="create-tab" class="tab-panel active">
                        <h3 data-i18n="geometryHeading">Vector Geometry Creation</h3>
                        <p class="section-desc" data-i18n="geometryDesc">Select a tool from the map or input exact coordinates below.</p>
                        
                        <div class="tool-section">
                            <label data-i18n="coordFormat">Coordinate Format</label>
                            <select id="coord-format-selector" class="form-control">
                                <option value="DD">Decimal Degrees (DD)</option>
                                <option value="DMS">Degrees Minutes Seconds (DMS)</option>
                                <option value="UTM">UTM</option>
                                <option value="MGRS">MGRS</option>
                            </select>
                        </div>
                        
                        <div id="coordinate-input-form" class="tool-section">
                            <div class="placeholder-msg" data-i18n="selectFeatureHint">Select geometry type to begin manual input.</div>
                        </div>
                    </div>

                    <div id="import-tab" class="tab-panel">
                        <h3 data-i18n="importHeading">Spatial Ingestion</h3>
                        <div class="drop-zone" id="file-drop-zone">
                            <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
                            <p data-i18n="dragDropText">Drag & Drop files here or click to browse</p>
                            <span class="file-formats">GeoJSON, KML, GPX, Shapefile (.zip), CSV, XLSX</span>
                            <input type="file" id="file-input" hidden multiple accept=".geojson,.json,.kml,.kmz,.gpx,.zip,.csv,.xlsx,.xls">
                        </div>
                    </div>

                    <div id="export-tab" class="tab-panel">
                        <h3 data-i18n="exportHeading">Data Egress</h3>
                        <div class="tool-section">
                            <label data-i18n="selectExportLayer">Select Layer to Export</label>
                            <select id="export-layer-selector" class="form-control">
                                <option value="drawn-layer" data-i18n="drawnFeatures">Custom Drawn Features</option>
                            </select>
                        </div>
                        <div class="tool-section">
                            <label data-i18n="exportFormat">Target Format</label>
                            <select id="export-format-selector" class="form-control">
                                <option value="geojson">GeoJSON</option>
                                <option value="kml">KML</option>
                                <option value="gpx">GPX</option>
                                <option value="shp">Shapefile (ZIP)</option>
                            </select>
                        </div>
                        <button id="export-execute-btn" class="btn btn-primary w-100 mt-3">
                            <i class="fa-solid fa-download"></i> <span data-i18n="btnExport">Export Layer</span>
                        </button>
                    </div>

                </div>
            </aside>

            <main id="map" class="map-viewport"></main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.0/dist/leaflet-geoman.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    
    <script src="app.js" defer></script>
</body>
</html>
